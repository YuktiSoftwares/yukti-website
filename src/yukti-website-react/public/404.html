<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>404 - Page Not Found</title>
    <style>
      /* Resetting default styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #333;
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column-reverse;
        justify-content: center;
      }
      .button-text {
        text-align: center;
      }
      img {
        max-width: 400px;
      }
      .hero_image {
        flex: 1;
      }

      h1 {
        font-size: 100px;
        font-weight: bold;
        margin-top: 20px;
        color: #e74c3c;
      }

      p {
        font-size: 20px;
        margin-top: 10px;
        color: #777;
      }

      .cta-btn {
        display: inline-block;
        background-color: #3498db;
        color: #fff;
        padding: 1rem 2rem; /* Fluid spacing */
        margin-top: 2rem;
        font-size: 1.1rem; /* Scales better than px */
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: bold;
        text-transform: uppercase;
        transition: background 0.3s ease;
      }

      /* Optional hover effect */
      .cta-btn:hover {
        background-color: #2c80b4;
      }

      /* Medium devices (tablets) */
      @media (max-width: 768px) {
        .cta-btn {
          padding: 0.9rem 1.8rem;
          font-size: 1rem;
        }
      }

      /* Small devices (mobiles) */
      @media (max-width: 480px) {
        .cta-btn {
          padding: 0.8rem 1.5rem;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="button-text">
        <p>Oops! The page you are looking for doesn't exist.</p>
        <a href="/" class="cta-btn">Go Back to Homepage</a>
        <div class="footer">
          <p>Need help? <a href="mailto:contact@yuktisoftware.com">Contact us</a></p>
        </div>
      </div>
      <div class="hero_image">
        <!-- Logo Image -->
        <img src="error_404.png" alt="Yukti Software Logo" />
      </div>
    </div>
  </body>
</html>
